{% if messages %}

<div class="custom-messages-container">

    {% for message in messages %}

        <div class="alert alert-{{ message.tags }} alert-dismissible fade show shadow">

            {{ message }}

            <button type="button"
                    class="btn-close"
                    data-bs-dismiss="alert">
            </button>

        </div>

    {% endfor %}

</div>

{% endif %}
