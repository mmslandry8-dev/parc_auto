{% extends 'base.html' %}

{% block content %}

<div class="container-fluid">

    <div class="row">

        <!-- SIDEBAR -->
        {% include 'components/sidebar.html' %}

        <!-- CONTENT -->
        <div class="col-md-10 p-4">

            <div class="card shadow border-0">

                <div class="card-body p-5">

                    <h2 class="fw-bold mb-4">
                        💰 Vente Terrain
                    </h2>

                    <form method="POST">

                        {% csrf_token %}

                        <div class="row">

                            <!-- CLIENT -->
                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Nom client
                                </label>

                                {{ form.username }}

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Email
                                </label>

                                {{ form.email }}

                            </div>

                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Mot de passe
                                </label>

                                {{ form.password }}

                            </div>

                            <!-- VEHICULE -->
                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Véhicule
                                </label>

                                {{ form.vehicle }}

                            </div>

                            <!-- PAIEMENT -->
                            <div class="col-md-6 mb-3">

                                <label class="form-label">
                                    Méthode paiement
                                </label>

                                {{ form.methode }}

                            </div>

                        </div>

                        <button class="btn btn-dark px-5">

                            Valider vente

                        </button>

                    </form>

                </div>

            </div>

        </div>

    </div>

</div>

{% endblock %}
