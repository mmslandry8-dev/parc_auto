<!DOCTYPE html>
<html>

<head>

    <meta charset="utf-8">

    <style>

        body {

            font-family: Arial;

            padding: 30px;

        }

        .header {

            text-align: center;

            margin-bottom: 40px;

        }

        .title {

            font-size: 28px;

            font-weight: bold;

        }

        .box {

            margin-top: 20px;

            padding: 20px;

            border: 1px solid #ddd;

        }

        .footer {

            margin-top: 50px;

            text-align: center;

            font-size: 12px;

            color: gray;

        }

    </style>

</head>

<body>

    <div class="header">

        <div class="title">

            FACTURE LOCATION

        </div>

        <p>
            Parc Auto Management
        </p>

    </div>

    <div class="box">

        <p>
            <strong>Client :</strong>
            {{ rental.client.username }}
        </p>

        <p>
            <strong>Véhicule :</strong>
            {{ rental.vehicle }}
        </p>

        <p>
            <strong>Date début :</strong>
            {{ rental.date_debut }}
        </p>

        <p>
            <strong>Date fin :</strong>
            {{ rental.date_fin }}
        </p>

        <hr>

        <h2>
            TOTAL :
            {{ rental.prix_total }} FCFA
        </h2>

    </div>

    <div class="footer">

        Merci pour votre confiance.

    </div>

</body>

</html>
